<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biossensor pH - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { margin: 0; color: #2c3e50; }
        .controls { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        button { padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #btnConnect { background-color: #3498db; color: white; }
        #btnConnect:hover { background-color: #2980b9; }
        #btnToggle { background-color: #2ecc71; color: white; }
        #btnToggle:hover { background-color: #27ae60; }
        #btnToggle.stop { background-color: #e74c3c; }
        #btnToggle.stop:hover { background-color: #c0392b; }
        #btnExport { background-color: #f39c12; color: white; }
        #btnExport:hover { background-color: #e67e22; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .config-box { display: flex; align-items: center; gap: 10px; background: #ecf0f1; padding: 10px; border-radius: 5px; }
        input[type="number"] { width: 60px; padding: 5px; border: 1px solid #ccc; border-radius: 3px; }
        .display-panel { text-align: center; margin: 30px 0; padding: 30px; background: #e8f8f5; border-radius: 10px; border: 2px solid #1abc9c; position: relative; }
        .ph-value { font-size: 5em; font-weight: bold; color: #16a085; margin: 0; }
        .ph-label { font-size: 1.2em; color: #7f8c8d; margin-bottom: 10px;}
        .debug-panel { display: flex; justify-content: center; gap: 30px; margin-top: 15px; color: #7f8c8d; font-family: monospace; font-size: 1.1em; background: #d1f2eb; padding: 10px; border-radius: 5px; display: inline-flex;}
        canvas { max-height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Espectrofotómetro de pH (Phenol Red)</h1>
        <button id="btnConnect">Conectar Bluetooth</button>
    </header>

    <div class="controls">
        <button id="btnToggle" disabled>▶ INICIAR MEDIÇÃO</button>
        <button id="btnExport">EXPORTAR CSV</button>
        
        <div class="config-box">
            <label for="avgWindow"><strong>Amostras (Média Móvel):</strong></label>
            <input type="number" id="avgWindow" value="20" min="1" max="100">
        </div>
    </div>

    <div class="display-panel">
        <p class="ph-label">pH Suavizado (Atual)</p>
        <p class="ph-value" id="displayPh">--.--</p>
        
        <div class="debug-panel">
            <span>🔵 V_Azul: <strong id="debugAzul">0.000</strong> V</span>
            <span>🟢 V_Verde: <strong id="debugVerde">0.000</strong> V</span>
        </div>
    </div>

    <div>
        <canvas id="phChart"></canvas>
    </div>
</div>

<script>
    // --- CONFIGURAÇÃO DO BLUETOOTH (UUIDs Standard UART) ---
    const bleServiceUUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const bleTxCharacteristicUUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; 
    const bleRxCharacteristicUUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; 

    let bleDevice;
    let bleServer;
    let rxCharacteristic;
    let txCharacteristic;

    // --- VARIÁVEIS DE ESTADO E DADOS ---
    let isMeasuring = false;
    let phHistory = []; 
    // Nova Tabela invisível (AGORA COM 5 COLUNAS PARA O DEBUG!)
    let csvData = [["Hora", "pH Bruto", "pH Suavizado", "V_Azul (RAW)", "V_Verde (RAW)"]]; 
    
    const displayPh = document.getElementById('displayPh');
    const debugAzul = document.getElementById('debugAzul');
    const debugVerde = document.getElementById('debugVerde');
    const btnConnect = document.getElementById('btnConnect');
    const btnToggle = document.getElementById('btnToggle');
    const avgWindowInput = document.getElementById('avgWindow');
    const btnExport = document.getElementById('btnExport');

    // Inicializar o Gráfico Chart.js
    const ctx = document.getElementById('phChart').getContext('2d');
    const phChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'pH Bruto',
                data: [],
                borderColor: '#3498db',
                backgroundColor: 'rgba(52, 152, 219, 0.1)',
                borderWidth: 2,
                pointRadius: 2,
                fill: true,
                tension: 0.2
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { title: { display: true, text: 'Valor de pH' } },
                x: { title: { display: true, text: 'Leituras' } }
            },
            animation: false
        }
    });

    // --- LÓGICA DO BLUETOOTH ---
    btnConnect.addEventListener('click', async () => {
        try {
            console.log('A pedir dispositivo Bluetooth...');
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ services: [bleServiceUUID] }]
            });

            bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

            console.log('A ligar ao servidor GATT...');
            bleServer = await bleDevice.gatt.connect();

            console.log('A obter serviço...');
            const service = await bleServer.getPrimaryService(bleServiceUUID);

            console.log('A obter características...');
            txCharacteristic = await service.getCharacteristic(bleTxCharacteristicUUID);
            rxCharacteristic = await service.getCharacteristic(bleRxCharacteristicUUID);

            await txCharacteristic.startNotifications();
            txCharacteristic.addEventListener('characteristicvaluechanged', handleDataReceived);

            btnConnect.textContent = 'Conectado';
            btnConnect.style.backgroundColor = '#27ae60';
            btnToggle.disabled = false;
            
        } catch (error) {
            console.error('Erro na ligação Bluetooth:', error);
            alert('Não foi possível conectar. Verifica se o ESP32 está ligado e perto.');
        }
    });

    function onDisconnected() {
        btnConnect.textContent = 'Conectar Bluetooth';
        btnConnect.style.backgroundColor = '#3498db';
        btnToggle.disabled = true;
        isMeasuring = false;
        updateToggleButton();
        alert('Dispositivo Desconectado!');
    }

    // --- ENVIAR COMANDOS START/STOP ---
    btnToggle.addEventListener('click', async () => {
        if (!rxCharacteristic) return;
        
        isMeasuring = !isMeasuring;
        const command = isMeasuring ? "START\n" : "STOP\n";
        
        try {
            let encoder = new TextEncoder();
            await rxCharacteristic.writeValue(encoder.encode(command));
            updateToggleButton();
        } catch (error) {
            console.error('Erro ao enviar comando:', error);
            isMeasuring = !isMeasuring; 
        }
    });

    function updateToggleButton() {
        if (isMeasuring) {
            btnToggle.textContent = '⏹ PARAR MEDIÇÃO';
            btnToggle.classList.add('stop');
        } else {
            btnToggle.textContent = '▶ INICIAR MEDIÇÃO';
            btnToggle.classList.remove('stop');
        }
    }

    // --- RECEBER E PROCESSAR DADOS (MODO DEBUG COM STRING DIVIDIDA) ---
    function handleDataReceived(event) {
        let decoder = new TextDecoder();
        let receivedText = decoder.decode(event.target.value).trim();
        
        // Separa a string "pH,VoltAzul,VoltVerde" nos 3 valores originais
        let parts = receivedText.split(",");
        
        if (parts.length === 3) {
            let rawPh = parseFloat(parts[0]);
            let vAzul = parseFloat(parts[1]);
            let vVerde = parseFloat(parts[2]);
            
            if (!isNaN(rawPh) && !isNaN(vAzul) && !isNaN(vVerde)) {
                processNewReading(rawPh, vAzul, vVerde);
            }
        }
    }

    function processNewReading(rawPh, vAzul, vVerde) {
        // 1. Atualizar o histórico para a Média Móvel
        let windowSize = parseInt(avgWindowInput.value) || 20;
        phHistory.push(rawPh);
        
        if (phHistory.length > windowSize) {
            phHistory.shift(); 
        }

        // 2. Calcular a Média
        let sum = phHistory.reduce((a, b) => a + b, 0);
        let avgPh = sum / phHistory.length;

        // 3. Atualizar os Ecrãs (Principal e Debug)
        displayPh.textContent = avgPh.toFixed(2);
        debugAzul.textContent = vAzul.toFixed(3);
        debugVerde.textContent = vVerde.toFixed(3);

        // 4. Calcular o tempo e Atualizar o CSV e o Gráfico
        let now = new Date();
        let timeLabel = now.getHours() + ':' + now.getMinutes() + ':' + now.getSeconds();
        
        // Guardar as 5 colunas no nosso "Excel invisível"
        csvData.push([timeLabel, rawPh.toFixed(3), avgPh.toFixed(3), vAzul.toFixed(3), vVerde.toFixed(3)]);

        phChart.data.labels.push(timeLabel);
        phChart.data.datasets[0].data.push(rawPh);
        
        if (phChart.data.labels.length > 50) {
            phChart.data.labels.shift();
            phChart.data.datasets[0].data.shift();
        }
        
        phChart.update();
    }

    // --- GERAR E DESCARREGAR O EXCEL / CSV ---
    btnExport.addEventListener('click', () => {
        if (csvData.length <= 1) {
            alert("Ainda não há dados para exportar! Inicia uma medição primeiro.");
            return;
        }

        // Usar ; como separador (Padrão PT/Excel Europeu) e BOM para os caracteres especiais
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF" 
            + csvData.map(e => e.join(";")).join("\n");

        let encodedUri = encodeURI(csvContent);
        let link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        
        let dateStr = new Date().toISOString().slice(0,10);
        link.setAttribute("download", "Biossensor_Dados_ComDebug_" + dateStr + ".csv");
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });
</script>

</body>
</html>
